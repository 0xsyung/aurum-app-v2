<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    // Preserve the path for SPA routing
    const path = window.location.pathname
    console.log('[404.html] Current path:', path)

    // Only redirect 404s, not actual files
    if (!path.includes('.') && !path.includes('/api/')) {
      // Remove the repo name from the path
      const decodedPath = decodeURIComponent(path).replace(/^\/aurum-app-v2/, '')
      console.log('[404.html] Decoded path:', decodedPath)

      // Store the path in sessionStorage
      sessionStorage.setItem('redirectPath', decodedPath || '/')
      console.log('[404.html] Stored redirectPath:', decodedPath || '/')

      // Redirect to index.html
      console.log('[404.html] Redirecting to /aurum-app-v2/')
      window.location.replace('/aurum-app-v2/')
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
